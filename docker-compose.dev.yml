version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: chainsentinel-postgres-dev
    environment:
      POSTGRES_USER: chainsentinel
      POSTGRES_PASSWORD: chainsentinel
      POSTGRES_DB: chainsentinel
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chainsentinel"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chainsentinel-redis-dev
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: chainsentinel-neo4j-dev
    environment:
      NEO4J_AUTH: neo4j/chainsentinel
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_dev_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  postgres_dev_data:
  neo4j_dev_data:
